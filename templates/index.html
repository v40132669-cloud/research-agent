<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自动化研报 Agent</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>自动化研报 Agent</h1>
            <p class="subtitle">基于 AI 的多智能体调研系统</p>
        </header>

        <main>
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="topicInput" 
                        placeholder="输入调研主题，如：Tesla、Notion、新能源汽车..."
                        autocomplete="off"
                    >
                    <button id="researchBtn" onclick="startResearch()">
                        <span class="btn-text">开始调研</span>
                        <span class="btn-loading" style="display: none;">调研中...</span>
                    </button>
                </div>
            </div>

            <div class="progress-section" id="progressSection" style="display: none;">
                <h3>调研进度</h3>
                <div class="progress-steps">
                    <div class="step" id="step-planner">
                        <div class="step-icon">1</div>
                        <div class="step-content">
                            <div class="step-title">规划调研</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                    <div class="step" id="step-researcher">
                        <div class="step-icon">2</div>
                        <div class="step-content">
                            <div class="step-title">信息搜集</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                    <div class="step" id="step-analyst">
                        <div class="step-icon">3</div>
                        <div class="step-content">
                            <div class="step-title">分析整理</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                    <div class="step" id="step-reviewer">
                        <div class="step-icon">4</div>
                        <div class="step-content">
                            <div class="step-title">质量审核</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                    <div class="step" id="step-writer">
                        <div class="step-icon">5</div>
                        <div class="step-content">
                            <div class="step-title">生成报告</div>
                            <div class="step-status">等待中...</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="plan-section" id="planSection" style="display: none;">
                <h3>调研规划</h3>
                <div class="plan-list" id="planList"></div>
            </div>

            <div class="result-section" id="resultSection" style="display: none;">
                <div class="result-header">
                    <h3>调研报告</h3>
                    <div class="result-actions">
                        <button onclick="copyReport()">复制</button>
                        <button onclick="downloadReport()">下载 Markdown</button>
                    </div>
                </div>
                <div class="report-content" id="reportContent"></div>
            </div>
        </main>

        <        footer>
            <p>Powered by LangGraph + FastAPI + 讯飞星火</p>
        </footer>
    </div>

    <script>
        let currentTopic = '';
        let eventSource = null;

        // 回车键触发
        document.getElementById('topicInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                startResearch();
            }
        });

        function startResearch() {
            const input = document.getElementById('topicInput');
            const topic = input.value.trim();
            
            if (!topic) {
                alert('请输入调研主题');
                return;
            }

            currentTopic = topic;
            resetUI();
            setLoading(true);
            showProgress();

            // 使用流式 API
            const eventSource = new EventSource('/api/research/stream', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ topic: topic })
            });

            // 由于 EventSource 不支持 POST，改用 fetch + ReadableStream
            fetchStreamResearch(topic);
        }

        async function fetchStreamResearch(topic) {
            try {
                const response = await fetch('/api/research/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ topic: topic })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                handleStreamData(data);
                            } catch (e) {
                                console.error('Parse error:', e);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('Stream error:', error);
                showError('调研过程中发生错误: ' + error.message);
            }
        }

        function handleStreamData(data) {
            console.log('Received:', data);

            switch (data.type) {
                case 'start':
                    updateStep('step-planner', 'active', '进行中...');
                    break;
                
                case 'plan':
                    updateStep('step-planner', 'completed', '已完成');
                    updateStep('step-researcher', 'active', '搜集中...');
                    showPlan(data.data);
                    break;
                
                case 'research':
                    updateStep('step-researcher', 'completed', `已搜集 ${data.content_count} 条内容`);
                    updateStep('step-analyst', 'active', '分析中...');
                    break;
                
                case 'analysis':
                    updateStep('step-analyst', 'completed', '已完成');
                    updateStep('step-reviewer', 'active', '审核中...');
                    break;
                
                case 'review':
                    const status = data.decision === 'approve' ? '已通过' : '需补充';
                    updateStep('step-reviewer', 'completed', status);
                    if (data.decision === 'approve') {
                        updateStep('step-writer', 'active', '撰写中...');
                    }
                    break;
                
                case 'report':
                    updateStep('step-writer', 'completed', '已完成');
                    showReport(data.report);
                    break;
                
                case 'complete':
                    setLoading(false);
                    showReport(data.report);
                    break;
                
                case 'error':
                    setLoading(false);
                    showError(data.message);
                    break;
            }
        }

        function resetUI() {
            document.getElementById('planSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('planList').innerHTML = '';
            document.getElementById('reportContent').innerHTML = '';
            
            // 重置所有步骤
            const steps = ['step-planner', 'step-researcher', 'step-analyst', 'step-reviewer', 'step-writer'];
            steps.forEach(step => {
                updateStep(step, '', '等待中...');
            });
        }

        function setLoading(loading) {
            const btn = document.getElementById('researchBtn');
            btn.disabled = loading;
            btn.querySelector('.btn-text').style.display = loading ? 'none' : 'inline';
            btn.querySelector('.btn-loading').style.display = loading ? 'inline' : 'none';
        }

        function showProgress() {
            document.getElementById('progressSection').style.display = 'block';
        }

        function updateStep(stepId, status, text) {
            const step = document.getElementById(stepId);
            if (!step) return;
            
            step.className = 'step ' + status;
            step.querySelector('.step-status').textContent = text;
        }

        function showPlan(planData) {
            const planSection = document.getElementById('planSection');
            const planList = document.getElementById('planList');
            
            planList.innerHTML = planData.map((item, index) => `
                <div class="plan-item">
                    <div class="plan-number">${index + 1}</div>
                    <div class="plan-content">
                        <div class="plan-dimension">${item.dimension}</div>
                        <div class="plan-objective">${item.objective}</div>
                        <div class="plan-query">搜索词: ${item.query}</div>
                    </div>
                </div>
            `).join('');
            
            planSection.style.display = 'block';
        }

        function showReport(report) {
            const resultSection = document.getElementById('resultSection');
            const reportContent = document.getElementById('reportContent');
            
            // 将 Markdown 转换为 HTML（简单处理）
            const html = markdownToHtml(report);
            reportContent.innerHTML = html;
            
            resultSection.style.display = 'block';
            setLoading(false);
        }

        function markdownToHtml(markdown) {
            if (!markdown) return '';
            
            return markdown
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<strong>$1</strong>')
                .replace(/\*(.*)\*/gim, '<em>$1</em>')
                .replace(/`([^`]+)`/gim, '<code>$1</code>')
                .replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>')
                .replace(/\n\n/gim, '</p><p>')
                .replace(/\n/gim, '<br>');
        }

        function showError(message) {
            alert('错误: ' + message);
        }

        function copyReport() {
            const reportContent = document.getElementById('reportContent');
            const text = reportContent.innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('报告已复制到剪贴板');
            });
        }

        function downloadReport() {
            const reportContent = document.getElementById('reportContent');
            const text = reportContent.innerText;
            const blob = new Blob([text], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `研报_${currentTopic}_${new Date().toISOString().slice(0, 10)}.md`;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
